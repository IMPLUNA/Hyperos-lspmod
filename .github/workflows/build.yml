name: Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 自动生成测试签名密钥（放在 app/ 目录下，密码公开，仅供测试）
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Gradle 9.1.0 & Generate wrapper
        run: |
          wget https://services.gradle.org/distributions/gradle-9.1.0-bin.zip
          unzip gradle-9.1.0-bin.zip
          ./gradle-9.1.0/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Release
        run: ./gradlew clean assembleRelease

      - name: 下载APK
        uses: actions/upload-artifact@v4
        with:
          name: 模块安装包
          path: app/build/outputs/apk/release/app-release.apk
