name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # 全局安装 Gradle 8.2 系统级命令，不用 gradlew
      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install gradle -y
          gradle --version

      # 直接用原生 gradle 编译，避开 gradlew 不存在问题
      - name: Build Release
        run: gradle clean assembleRelease --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 状态栏模块_Release
          path: app/build/outputs/apk/release/app-release.apk

